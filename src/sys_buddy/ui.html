<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sys-buddy</title>
<!-- sys-buddy dashboard — single-file vanilla rebuild of the design prototype (SPEC §12).
     Served at /ui. Auth rides an HttpOnly sb_view cookie (set by /ui from the ?v=
     bootstrap link); fetches the read-only /api/* and receives live change
     notifications over an SSE stream (GET /api/stream). No framework, no build step. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --bg:#FAF9F7;--surface:#ffffff;--surface-2:#F5F3F0;--surface-3:#EDEAE5;
  --border:#EBE8E3;--border-strong:#DAD5CE;
  --text:#211F1C;--text-2:#6B6763;--text-3:#9C978F;
  --accent:#E0693F;--accent-2:#C4552E;--accent-soft:#FBEADF;
  --shadow:0 1px 2px rgba(40,30,20,.04),0 6px 16px rgba(40,30,20,.05);
  --st-open-bg:#EFEDEA;--st-open-fg:#6B6763;--st-open-dot:#A29D96;
  --st-proposed-bg:#E7F0FB;--st-proposed-fg:#2E6BC4;--st-proposed-dot:#3B82F6;
  --st-locked-bg:#EEE9FB;--st-locked-fg:#6D4BC4;--st-locked-dot:#8B5CF6;
  --st-live-bg:#DEF2EE;--st-live-fg:#1C8577;--st-live-dot:#14A08C;
  --st-testing-bg:#FBF0DA;--st-testing-fg:#A9720F;--st-testing-dot:#E0A22B;
  --st-verified-bg:#E1F2E3;--st-verified-fg:#2C8A3D;--st-verified-dot:#33A852;
  --st-stuck-bg:#FBE7E3;--st-stuck-fg:#BF4638;--st-stuck-dot:#DE5B4A;
  --role-backend:#5468C9;--role-frontend:#C0568C;--role-mobile:#3F9E8C;--role-system:#8A857F;
}
[data-theme="dark"]{
  --bg:#161514;--surface:#201E1D;--surface-2:#282624;--surface-3:#312E2B;
  --border:#332F2C;--border-strong:#443F3A;
  --text:#F3F1EE;--text-2:#A7A29C;--text-3:#726D68;
  --accent:#F0845C;--accent-2:#F59A77;--accent-soft:#38271F;
  --shadow:0 1px 2px rgba(0,0,0,.24),0 6px 18px rgba(0,0,0,.30);
  --st-open-bg:#2A2826;--st-open-fg:#A7A29C;--st-open-dot:#726D68;
  --st-proposed-bg:#1B2838;--st-proposed-fg:#82B2F0;--st-proposed-dot:#4B90ED;
  --st-locked-bg:#251F36;--st-locked-fg:#B79EF2;--st-locked-dot:#9B72F0;
  --st-live-bg:#152C28;--st-live-fg:#6BCCBE;--st-live-dot:#2FB3A0;
  --st-testing-bg:#2F2712;--st-testing-fg:#E6B95F;--st-testing-dot:#D9A032;
  --st-verified-bg:#182C1C;--st-verified-fg:#74CB82;--st-verified-dot:#3FB457;
  --st-stuck-bg:#301C19;--st-stuck-fg:#F08876;--st-stuck-dot:#DA6152;
  --role-backend:#7E8FE0;--role-frontend:#DB7CAC;--role-mobile:#5FBDAA;--role-system:#9A948D;
}
body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:'Geist',-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-2)}
button{font-family:inherit}
@keyframes cfall{0%{transform:translateY(-4px) rotate(0);opacity:0}12%{opacity:1}100%{transform:translateY(30px) rotate(240deg);opacity:0}}
@keyframes pulsedot{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
@keyframes ring{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.1);opacity:0}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
"use strict";

/* ---------- design maps (ported from the prototype Component) ---------- */
var SK={open:'open',contract_proposed:'proposed',contract_locked:'locked',backend_live:'live',testing:'testing',verified:'verified',stuck:'stuck'};
var SLAB={open:'open',contract_proposed:'planning',contract_locked:'contract locked',backend_live:'backend live',testing:'testing',verified:'verified',stuck:'stuck'};
var ORDER={open:0,contract_proposed:1,contract_locked:2,backend_live:3,testing:4,verified:5};
// `broker` is not an agent seat — it's the broker's own voice, used for the
// notifications it authors (e.g. contract_locked). Neutral system colour so it never
// reads as one of the peers talking.
var RL={backend:{i:'B',c:'var(--role-backend)',label:'backend'},frontend:{i:'F',c:'var(--role-frontend)',label:'frontend'},mobile:{i:'M',c:'var(--role-mobile)',label:'mobile'},broker:{i:'SB',c:'var(--role-system)',label:'sys-buddy'}};
// The 'preflight' node has no matching task state — it's a sub-phase of 'open',
// driven by per-agent readiness (see genSteps). ORDER above stays keyed on the REAL
// task states; genSteps maps real→display indices around the inserted node.
var STEPS=[['open','open'],['preflight','pre-flight assessments'],['contract_proposed','planning'],['contract_locked','locked'],['backend_live','backend live'],['testing','testing'],['verified','verified']];
var MAX_STRIKES=3;
var MONO="'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace";

function av(role){ return RL[role] || {i:(role?String(role)[0].toUpperCase():'?'),c:'var(--role-system)',label:role||'system'}; }
function stateChip(s){ var k=SK[s]||'open'; return {label:SLAB[s]||s, bg:'var(--st-'+k+'-bg)', fg:'var(--st-'+k+'-fg)', dot:'var(--st-'+k+'-dot)'}; }
function methodChip(m){ var k=({GET:'proposed',POST:'live',PUT:'locked',PATCH:'testing',DELETE:'stuck'})[m]||'open'; return {bg:'var(--st-'+k+'-bg)', fg:'var(--st-'+k+'-fg)'}; }
function typeChip(type,pass){
  var map={question:['question','open'],answer:['answer','proposed'],status_update:['status','open'],
    contract_proposal:['contract proposal','locked'],contract_lock:['contract lock','locked'],
    contract_locked:['contract locked','locked'],renegotiation:['replanning','proposed'],
    deploy_confirmed:['deploy confirmed','live'],verified:['verified','verified'],stuck:['stuck','stuck']};
  var label,key;
  if(type==='test_result'){ label=pass?'test · pass':'test · fail'; key=pass?'verified':'stuck'; }
  else { var e=map[type]||['message','open']; label=e[0]; key=e[1]; }
  return {label:label, bg:'var(--st-'+key+'-bg)', fg:'var(--st-'+key+'-fg)'};
}
function eventColor(kind){ return ({transition:'var(--st-proposed-dot)',lock:'var(--st-locked-dot)',deploy:'var(--st-live-dot)',test:'var(--st-testing-dot)',slack:'var(--accent)',token:'var(--st-open-dot)',task:'var(--st-open-dot)'})[kind]||'var(--st-open-dot)'; }

/* small inline SVGs */
function svg(w,inner){ return '<svg width="'+w+'" height="'+w+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+inner+'</svg>'; }
var IC={
  chevR:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>',
  back:svg(15,'<path d="M15 6l-6 6 6 6"/>'),
  caret:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>',
  log:svg(14,'<path d="M4 6h16M4 12h16M4 18h10"/>'),
  warn:svg(16,'<path d="M12 9v4M12 17h.01M10.3 3.9l-8 14A2 2 0 004 21h16a2 2 0 001.7-3l-8-14a2 2 0 00-3.4 0z"/>'),
  user:svg(13,'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>'),
  lockSmall:'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></svg>',
  doc:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>',
  sun:svg(16,'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/>'),
  moon:svg(16,'<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>'),
  link:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.5.5l3-3a5 5 0 00-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 00-7.5-.5l-3 3a5 5 0 007 7l1.5-1.5"/></svg>'
};
function dividerIcon(kind){
  if(kind==='lock') return svg(13,'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/>');
  if(kind==='slack') return svg(13,'<path d="M20 6L9 17l-5-5"/>');
  if(kind==='task') return svg(13,'<path d="M12 3v3M12 18v3M3 12h3M18 12h3"/><circle cx="12" cy="12" r="3"/>');
  /* transition / flow */
  return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
}

/* ---------- html escaping ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }

/* ---------- state ---------- */
/* The viewer token lives in an HttpOnly cookie (set by /ui on first load) and is
   sent automatically with same-origin /api fetches — JS neither reads nor forwards
   it. A missing/invalid token surfaces as a 401 from /api/tasks below. */
var state = {
  view:'list', taskId:null,
  theme: localStorage.getItem('sb-theme') || 'light',
  tasks:[], viewer:null, detail:null,
  loadingDetail:false,
  error:null,        // null | 'no-token' | 'unauthorized' | 'forbidden' | 'not-found' | 'network'
  expanded:{}, version:{}, eventFilter:'all', eventLogOpen:true,
  mobileTab:'thread', switcherOpen:false, isMobile: window.innerWidth<900,
  lastRefresh:0, refreshing:false
};
var lastSig=null;
var app=document.getElementById('app');

/* ---------- fetching ---------- */
function api(path){
  /* auth rides the HttpOnly sb_view cookie — same-origin, sent automatically */
  return fetch(path,{headers:{'Accept':'application/json'},credentials:'same-origin'});
}
function fetchTasks(){
  state.refreshing=true; patchVolatile();
  return api('/api/tasks').then(function(r){
    if(r.status===401){ state.error='unauthorized'; throw 0; }
    if(!r.ok) throw 0;
    return r.json();
  }).then(function(d){
    state.tasks=d.tasks||[]; state.viewer=d.viewer||null;
    if(state.error==='unauthorized'||state.error==='network') state.error=null;
    state.lastRefresh=Date.now();
  }).catch(function(e){
    if(state.error==null) state.error='network';
  }).then(function(){ state.refreshing=false; render(); });
}
function fetchDetail(id){
  if(!id) return Promise.resolve();
  return api('/api/task/'+encodeURIComponent(id)).then(function(r){
    if(r.status===401){ state.error='unauthorized'; throw 0; }
    if(r.status===403){ state.error='forbidden'; throw 0; }
    if(r.status===404){ state.error='not-found'; throw 0; }
    if(!r.ok) throw 0;
    return r.json();
  }).then(function(d){
    if(state.view==='task' && state.taskId===id){
      state.detail=d; state.loadingDetail=false;
      if(state.error==='forbidden'||state.error==='not-found'||state.error==='network') state.error=null;
    }
    state.lastRefresh=Date.now();
  }).catch(function(e){
    if(state.error==null) state.error='network';
  }).then(function(){ render(); });
}

/* ---------- navigation ---------- */
function openTask(id){
  state.view='task'; state.taskId=id; state.detail=null; state.loadingDetail=true;
  state.switcherOpen=false; state.mobileTab='thread';
  if(state.error==='not-found'||state.error==='forbidden') state.error=null;
  render(); fetchDetail(id);
}
function goHome(){ state.view='list'; state.switcherOpen=false; state.detail=null; state.taskId=null; render(); }
function toggleTheme(){ state.theme = state.theme==='dark'?'light':'dark'; localStorage.setItem('sb-theme',state.theme); render(); }

/* ---------- style helpers ---------- */
function seg(active){ return 'padding:5px 13px;font-size:12.5px;font-weight:600;border-radius:7px;border:none;background:'+(active?'var(--surface)':'transparent')+';color:'+(active?'var(--text)':'var(--text-2)')+';box-shadow:'+(active?'var(--shadow)':'none'); }
function tabStyle(active){ return 'flex:1;padding:10px 0;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;color:'+(active?'var(--accent)':'var(--text-2)')+';border-bottom:'+(active?'2px solid var(--accent)':'2px solid transparent'); }
function filterStyle(active){ return 'padding:3px 10px;border-radius:7px;border:1px solid '+(active?'var(--accent)':'var(--border)')+';background:'+(active?'var(--accent-soft)':'transparent')+';color:'+(active?'var(--accent-2)':'var(--text-2)')+';font-size:11px;font-weight:600;cursor:pointer;font-family:'+MONO; }
function vBtnStyle(active){ return 'padding:4px 10px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'+MONO+';display:flex;align-items:center;gap:4px;background:'+(active?'var(--surface)':'transparent')+';color:'+(active?'var(--text)':'var(--text-2)')+';box-shadow:'+(active?'var(--shadow)':'none'); }

/* ---------- stepper ---------- */
/* Pre-flight is done once every live agent has passed (readiness_status), with a
   fallback to the legacy `ready` bool. No agents yet → not done. */
function preflightPassed(agents){
  if(!agents||!agents.length) return false;
  return agents.every(function(a){ return a.readiness_status==='passed' || a.ready; });
}

function genSteps(stateName, times, agents){
  times=times||{};
  var isStuck = stateName==='stuck';
  var realO = ORDER[stateName]!=null?ORDER[stateName]:0;   // index into REAL task states
  var preDone = preflightPassed(agents);
  function disp(ri){ return ri===0?0:ri+1; }               // real index → display index
  // Display frontier (into the 7-node STEPS incl. the inserted pre-flight at index 1).
  var o = isStuck ? 5 : (stateName==='open' ? 1 : disp(realO));
  var last = STEPS.length-1;
  // Pass 1: resolve done/current/stuck per node (the pre-flight node is special-cased
  // because it has no matching task state — it's driven by agent readiness).
  var meta = STEPS.map(function(s,i){
    var key=s[0];
    var stuckStep = isStuck && i===5;
    var done, current;
    if(key==='preflight'){
      done = (stateName!=='open') || preDone;
      current = stateName==='open' && !preDone && !isStuck;
    } else {
      done = i<o || (stateName==='verified' && i===o);
      current = i===o && !isStuck && stateName!=='verified';
    }
    return {done:done, current:current, stuck:stuckStep};
  });
  var reached=function(m){ return m.done||m.current||m.stuck; };
  return STEPS.map(function(s,i){
    var key=s[0], m=meta[i];
    var done=m.done, current=m.current, stuckStep=m.stuck;
    var node='width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;';
    if(stuckStep) node+='background:var(--st-stuck-dot);';
    else if(done) node+='background:var(--st-verified-dot);';
    else if(current) node+='background:var(--accent);';
    else node+='background:var(--surface);border:2px solid var(--border-strong);';
    var leftColor = i===0 ? 'transparent' : (reached(m) ? 'var(--st-verified-dot)' : 'var(--border-strong)');
    var rightColor = i===last ? 'transparent' : (reached(meta[i+1]) ? 'var(--st-verified-dot)' : 'var(--border-strong)');
    var labelColor = (done||current) ? 'var(--text)' : (stuckStep ? 'var(--st-stuck-fg)' : 'var(--text-3)');
    var inner='';
    if(done) inner='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2"><path d="M20 6L9 17l-5-5"/></svg>';
    else if(current) inner='<span style="width:8px;height:8px;border-radius:50%;background:#fff"></span><span style="position:absolute;inset:0;border-radius:50%;border:2px solid var(--accent);animation:ring 1.6s ease-out infinite"></span>';
    else if(stuckStep) inner='<span style="color:#fff;font-weight:700;font-size:14px">!</span>';
    else inner='<span style="width:6px;height:6px;border-radius:50%;background:var(--border-strong)"></span>';
    return {key:key, label:s[1], time:(done||current||stuckStep)?(times[key]||''):'', nodeStyle:node, inner:inner, leftColor:leftColor, rightColor:rightColor, labelColor:labelColor};
  });
}

/* ---------- role avatar helper ---------- */
/* Find the live agent for a role in the current task detail, or null when the
   detail (or its agents list) is missing — matched by role, then name. */
function agentFor(role, name){
  var ags = state.detail && state.detail.agents;
  if(!ags || !ags.length) return null;
  for(var i=0;i<ags.length;i++){ if(ags[i].role===role || (name&&ags[i].name===name)) return ags[i]; }
  return null;
}
/* A small corner badge on an agent's avatar reflecting the pre-flight state:
   green ✓ once they've passed (ready===true), amber 🔒 while they haven't.
   '' only when the agent/readiness is unknown (no agents list). */
var LOCK_TIP="Hasn't passed the pre-flight readiness check — can't send messages or change status yet.";
var READY_TIP="Passed the pre-flight readiness check — action tools unlocked.";
function lockBadge(role, name){
  var ag=agentFor(role, name);
  if(!ag) return '';
  if(ag.ready){
    return '<span title="'+esc(READY_TIP)+'" style="position:absolute;bottom:-3px;right:-3px;width:13px;height:13px;border-radius:50%;background:var(--st-verified-bg);color:var(--st-verified-fg);border:1.5px solid var(--surface);display:flex;align-items:center;justify-content:center">'+
      '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></span>';
  }
  return '<span title="'+esc(LOCK_TIP)+'" style="position:absolute;bottom:-3px;right:-3px;width:13px;height:13px;border-radius:50%;background:var(--st-stuck-bg);color:var(--st-stuck-fg);border:1.5px solid var(--surface);display:flex;align-items:center;justify-content:center">'+
    '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></svg></span>';
}
function avatarChip(role, size, fs){
  var a=av(role);
  var lock=lockBadge(role);
  return '<span title="'+esc(a.label)+'" style="position:relative;width:'+size+'px;height:'+size+'px;border-radius:7px;background:'+a.c+';color:#fff;font-size:'+fs+'px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none">'+esc(a.i)+lock+'</span>';
}

/* ---------- pre-flight pills (under the pre-flight stepper node) ---------- */
/* One tiny pill per agent — the host/buddy status shown right under the "pre-flight
   assessments" node: green "passed", red "failed", grey "pending" (the default).
   Reads readiness_status, falling back to the legacy `ready` bool. */
function preflightStatus(ag){
  if(ag.readiness_status) return ag.readiness_status;
  return ag.ready ? 'passed' : 'pending';
}
function preflightPills(d){
  var ags=(d&&d.agents)||[];
  if(!ags.length) return '';
  var pills=ags.map(function(ag){
    var a=av(ag.role);
    var s=preflightStatus(ag);
    var cfg = s==='passed' ? {bg:'var(--st-verified-bg)',fg:'var(--st-verified-fg)',lbl:'passed'}
           : s==='failed' ? {bg:'var(--st-stuck-bg)',fg:'var(--st-stuck-fg)',lbl:'failed'}
           : {bg:'var(--st-open-bg)',fg:'var(--st-open-fg)',lbl:'pending'};
    var ic = s==='passed' ? '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M20 6L9 17l-5-5"/></svg>'
           : s==='failed' ? '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M18 6L6 18M6 6l12 12"/></svg>'
           : '<span style="width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7"></span>';
    return '<span title="'+esc(a.label)+' — '+cfg.lbl+'" style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;font-size:9.5px;font-weight:700;background:'+cfg.bg+';color:'+cfg.fg+';max-width:100%">'+
      '<span style="width:12px;height:12px;border-radius:4px;background:'+a.c+';color:#fff;font-size:8px;display:inline-flex;align-items:center;justify-content:center;flex:none">'+esc(a.i)+'</span>'+ic+'</span>';
  }).join('');
  return '<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:6px;max-width:120px">'+pills+'</div>';
}

/* A labeled pre-flight row (used in the debug view, which has no stepper): each
   agent with its role label and a passed/failed/pending pill. */
function preflightRow(d){
  var ags=(d&&d.agents)||[];
  if(!ags.length) return '';
  var chips=ags.map(function(ag){
    var a=av(ag.role), s=preflightStatus(ag);
    var cfg = s==='passed' ? {bg:'var(--st-verified-bg)',fg:'var(--st-verified-fg)',lbl:'passed'}
           : s==='failed' ? {bg:'var(--st-stuck-bg)',fg:'var(--st-stuck-fg)',lbl:'failed'}
           : {bg:'var(--st-open-bg)',fg:'var(--st-open-fg)',lbl:'pending'};
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bg);border:1px solid var(--border);border-radius:9px">'+
      avatarChip(ag.role,20,9)+'<span style="font-size:12px;font-weight:600;color:var(--text)">'+esc(a.label)+'</span>'+

/* When an agent FAILED pre-flight, show the human exactly which questions it missed
   and the broker's hint — so they can coach it, then the agent re-runs submit_readiness.

function readinessFailPanel(d){
  var ags=((d&&d.agents)||[]).filter(function(a){ return preflightStatus(a)==='failed' && a.readiness_report; });

  var blocks=ags.map(function(ag){
    var a=av(ag.role);

      return '<li style="margin:0 0 6px"><span style="font-family:'+MONO+';font-size:10.5px;font-weight:700;color:var(--st-stuck-fg);background:var(--st-stuck-bg);padding:1px 6px;border-radius:5px">'+esc(r.id)+'</span> <span style="color:var(--text-2)">'+esc(r.hint||'')+'</span></li>';

function refreshText(){
  if(state.error) return 'connection issue';
  if(!state.lastRefresh) return 'connecting…';
  var s=Math.floor((Date.now()-state.lastRefresh)/1000);
  if(s<3) return 'Last refreshed just now';
  if(s<60) return 'Last refreshed '+s+'s ago';
  return 'Last refreshed '+Math.floor(s/60)+'m ago';
}

/* ---------- thread (messages + interleaved broker dividers) ---------- */
function minutes(t){ if(!t||t==='—') return -1; var p=String(t).split(':'); return (+p[0])*60+(+p[1]); }
function buildThread(d){
  var items=[];
  (d.messages||[]).forEach(function(m,idx){ items.push({t:m.time, min:minutes(m.time), ts:(typeof m.ts==='number'?m.ts:null), kind:'msg', m:m, ord:idx}); });
  var DIV={task:1,transition:1,lock:1,slack:1};
  (d.events||[]).forEach(function(ev,idx){
    var evk=ev[1];
    if(!DIV[evk]) return; // deploy/test/token are shown as bubbles or belong to the log
    var mn=minutes(ev[0]); if(evk==='task') mn-=0.5; // creation sorts first within its minute
    items.push({t:ev[0], min:mn, ts:(typeof ev[3]==='number'?ev[3]:null), kind:'div', evkind:evk, text:ev[2], ord:1000+idx});
  });
  // Sort by true creation time (ts, sub-second) when the API supplies it for every
  // item; otherwise fall back to the legacy minute-granularity sort (keeps a stale
  // API — e.g. before a broker restart — from breaking the thread). `ord` breaks ties
  // stably so same-instant items keep the order the API returned them (id order).
  var allTs = items.length>0 && items.every(function(it){ return typeof it.ts==='number' && isFinite(it.ts); });
  if(allTs){ items.sort(function(a,b){ return (a.ts-b.ts) || (a.ord-b.ord); }); }
  else     { items.sort(function(a,b){ return (a.min-b.min) || (a.ord-b.ord); }); }
  return items;
}
function bubbleStyle(type,pass){
  var s='background:var(--surface-2);border:1px solid var(--border);border-radius:12px;border-top-left-radius:4px;padding:11px 13px;font-size:13.5px;line-height:1.55;color:var(--text)';
  if(type==='verified') s='background:var(--st-verified-bg);border:1px solid var(--st-verified-dot);border-radius:12px;border-top-left-radius:4px;padding:11px 13px;font-size:13.5px;line-height:1.55;color:var(--text)';
  else if(type==='test_result' && !pass) s='background:var(--surface-2);border:1px solid var(--st-stuck-dot);border-radius:12px;border-top-left-radius:4px;padding:11px 13px;font-size:13.5px;line-height:1.55;color:var(--text)';
  return s;
}
function confettiHTML(){

    '</div></div>';

function threadHTML(d){

  var selId = state.version[d.id] || c.default || (c.versions[0]&&c.versions[0].id);
  var vbtns = c.versions.map(function(v){
    return '<button data-version="'+esc(v.id)+'" style="'+vBtnStyle(v.id===selId)+';cursor:pointer">'+(v.locked?IC.lockSmall:'')+esc(v.id)+'</button>';
  }).join('');
  var data = (c.data&&c.data[selId]) || {locked:false,signed:[],endpoints:[]};
  var draft = !data.locked;
  var statusBlock='';
  if(draft){
    statusBlock='<div style="margin-top:11px;display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px dashed var(--border-strong);border-radius:10px;font-size:12px;color:var(--text-2)"><span style="width:8px;height:8px;border-radius:50%;border:1.5px dashed var(--text-3)"></span>Draft — awaiting signatures</div>';
  } else if((data.signed||[]).length){
    var chips=(data.signed||[]).map(function(sg){
      var a=av(sg.role);
      return '<span style="display:inline-flex;align-items:center;gap:6px;background:var(--st-verified-bg);border-radius:999px;padding:3px 10px 3px 3px;font-size:11px;color:var(--st-verified-fg);font-weight:600">'+
        '<span style="width:18px;height:18px;border-radius:6px;background:'+a.c+';color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center">'+esc(a.i)+'</span>'+esc(sg.role)+'<span style="font-family:'+MONO+';opacity:.75">'+esc(sg.time)+'</span></span>';
    }).join('');
    statusBlock='<div style="margin-top:11px"><div style="font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="color:var(--st-verified-fg);display:flex">'+dividerIcon('lock')+'</span>Locked · signed by all parties</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+chips+'</div></div>';
  }

  var eps=(data.endpoints||[]).map(function(e,i){

    var head='<button data-ep="'+esc(key)+'" style="width:100%;display:flex;align-items:center;gap:9px;padding:10px 11px;background:transparent;border:none;cursor:pointer;text-align:left;font-family:inherit">'+

    var detail='';
    if(expanded){
      var reqRows=(e.request||[]).map(function(f){
        var star = f.req ? '<span style="color:var(--accent)">*</span>':'';
        return '<div style="display:flex;gap:10px;padding:7px 11px;align-items:baseline;border-bottom:1px solid var(--border)"><span style="font-family:'+MONO+';font-size:12px;color:var(--text);font-weight:500">'+esc(f.n)+star+'</span><span style="font-family:'+MONO+';font-size:10.5px;color:var(--role-backend)">'+esc(f.t)+'</span><span style="font-size:11px;color:var(--text-3);margin-left:auto;text-align:right">'+esc(f.note||'')+'</span></div>';
      }).join('');
      var resRows=(e.response||[]).map(function(f){
        return '<div style="display:flex;gap:10px;padding:7px 11px;align-items:baseline;border-bottom:1px solid var(--border)"><span style="font-family:'+MONO+';font-size:12px;color:var(--text);font-weight:500">'+esc(f.n)+'</span><span style="font-family:'+MONO+';font-size:10.5px;color:var(--role-backend)">'+esc(f.t)+'</span><span style="font-size:11px;color:var(--text-3);margin-left:auto;text-align:right">'+esc(f.note||'')+'</span></div>';
      }).join('');
      var errRows=(e.errors||[]).map(function(er){
        return '<div style="display:flex;gap:9px;align-items:baseline"><span style="font-family:'+MONO+';font-size:10.5px;font-weight:700;color:var(--st-stuck-fg);background:var(--st-stuck-bg);padding:2px 6px;border-radius:5px;flex:none">'+esc(er.code)+'</span><span style="font-family:'+MONO+';font-size:11.5px;color:var(--text);flex:none">'+esc(er.name)+'</span><span style="font-size:11px;color:var(--text-3);margin-left:auto;text-align:right">'+esc(er.note||'')+'</span></div>';

      var resSec=(e.response||[]).length?'<div style="margin-bottom:13px"><div style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:7px;display:flex;justify-content:space-between"><span>Response</span><span style="color:var(--st-verified-fg);font-family:'+MONO+';text-transform:none;letter-spacing:0">'+esc(e.resStatus||'200 OK')+'</span></div><div style="border:1px solid var(--border);border-radius:9px;overflow:hidden">'+resRows+'</div></div>':'';
      var errSec=(e.errors||[]).length?'<div><div style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:7px">Errors</div><div style="display:flex;flex-direction:column;gap:6px">'+errRows+'</div></div>':'';
      detail='<div style="padding:0 13px 14px;border-top:1px solid var(--border)"><p style="font-size:12.5px;color:var(--text-2);margin:11px 0 13px;line-height:1.5">'+esc(e.summary||'')+'</p>'+reqSec+resSec+errSec+'</div>';
    }
    return '<div style="border:1px solid var(--border);border-radius:11px;margin:6px;overflow:hidden">'+head+detail+'</div>';
  }).join('');

  // The base URL the consumer connects to. Load-bearing (SPEC §9) and previously
  // invisible on the dashboard — surface it so the human can see exactly where the
  // frontend will point.
  var stagingBlock = data.staging_url
    ? '<div style="margin-top:11px;display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;min-width:0"><span style="display:flex;color:var(--text-3);flex:none">'+IC.link+'</span><span style="font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);flex:none">Connect to</span><span style="font-family:'+MONO+';font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(data.staging_url)+'">'+esc(data.staging_url)+'</span></div>'
    : '';
  return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden">'+
    '<div style="padding:14px 16px;border-bottom:1px solid var(--border)">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px"><span style="font-weight:600;font-size:14px;color:var(--text)">API contract</span>'+
      '<div style="display:flex;gap:3px;background:var(--surface-2);padding:3px;border-radius:9px">'+vbtns+'</div></div>'+statusBlock+stagingBlock+'</div>'+
    '<div style="padding:6px">'+eps+'</div></div>';
}

  if(stateName==='resolved'){
    return {label:'resolved ✓', bg:'var(--st-verified-bg)', fg:'var(--st-verified-fg)', dot:'var(--st-verified-dot)'};
  }
  return stateChip(stateName); // 'open' (and any other) falls through to the shared styles
}

/* ---------- shorthand cheatsheet (collapsed-by-default) ---------- */
/* The short commands a human types to THEIR OWN agent (taught in the agent prompt).
   Mirrored here so a watcher has the same reference. Contract vs debug show the
   codes that apply to each mode. */
function shortcodesHTML(d){
  var contract = !(d && d.mode==='debug');
  function code(c){ return '<span style="font-family:'+MONO+';font-size:10.5px;font-weight:600;color:var(--text);border:1px solid var(--border-strong);border-radius:6px;padding:1px 6px;white-space:nowrap">'+c+'</span>'; }
  function grp(label){ return '<div style="color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin:7px 0 1px">'+label+'</div>'; }
  function cmd(c, desc){ return '<div style="display:flex;gap:9px;align-items:baseline"><span style="flex:none;min-width:70px">'+code(c)+'</span><span>'+desc+'</span></div>'; }
  var rows =
    grp('Messaging')+
    cmd('wm', 'wait for the next message (blocks)')+
    cmd('ch', "check for new messages now (read + mark seen), don't block")+
    cmd('sm', 'send a message to everyone on the task')+
    cmd('sm @role', 'send it privately to just that role');
  if(contract){
    rows +=
      grp('Contract')+
      cmd('pc', 'propose a contract (the shared interface)')+
      cmd('gc', 'show the current contract')+
      cmd('sign', 'sign / lock the contract')+
      cmd('locked?', 'poll until the contract is locked')+
      cmd('reopen', 'reopen planning to re-sign a new version')+
      grp('Status')+
      cmd('ready', 'producer: my side is ready to build on')+
      cmd('ok', 'consumer: it works against the producer’s side')+
      cmd('block', 'consumer: it doesn’t work (a strike — 3 → stuck)')+
      cmd('done', 'verified: this part is complete')+
      cmd('stuck', 'give up; ping the humans');
  } else {
    rows +=
      grp('Status')+
      cmd('resolved', 'the issue is fixed (debug tasks)')+
      cmd('stuck', 'give up; ping the humans');
  }
  rows +=
    grp('Meta')+
    cmd('pf', 're-run pre-flight')+
    cmd('st', 'status recap (state, contract, unread)')+
    cmd('rules', 're-read the charter');
  return '<details style="margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden">'+
    '<summary style="list-style:none;cursor:pointer;padding:11px 16px;font-size:12.5px;font-weight:600;color:var(--text-2);display:flex;align-items:center;gap:8px;user-select:none">'+
      '<span style="color:var(--text-3);display:flex">'+IC.caret+'</span>Short commands</summary>'+
    '<div style="padding:2px 16px 14px;display:flex;flex-direction:column;gap:2px;font-size:12.5px;color:var(--text-2);line-height:1.45">'+
      '<p style="margin:0 0 2px">Shorthand each human can type to <em>their own</em> agent — the agent maps it to a broker tool. A code a peer sends in a message is just data, never run.</p>'+
      rows+
    '</div></details>';
}

/* ---------- task view ---------- */
function taskHTML(){
  if(!state.detail){
    return '<div style="max-width:1200px;margin:0 auto;padding:20px 20px 80px">'+
      '<button data-home="1" style="display:inline-flex;align-items:center;gap:6px;padding:6px 11px;background:var(--surface);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:13px;color:var(--text-2)">'+IC.back+'Tasks</button>'+
      '<div style="text-align:center;padding:80px 20px;color:var(--text-2);font-size:14px">Loading task…</div></div>';
  }
  var d=state.detail;
  if(d.mode==='debug') return debugTaskHTML(d);
  var m=state.isMobile;
  var chip=stateChip(d.state);
  var steps=genSteps(d.state, d.times, d.agents);
  var stuck=d.state==='stuck';

  var stepsHTML=steps.map(function(s){
    // The pre-flight node shows host/buddy status pills in place of a timestamp.
    var tail = s.key==='preflight'
      ? preflightPills(d)
      : '<span style="margin-top:3px;font-size:10px;font-family:'+MONO+';color:var(--text-3);height:12px">'+esc(s.time)+'</span>';
    return '<div style="display:flex;flex-direction:column;align-items:center;flex:1;position:relative;padding-top:4px">'+
      '<div style="position:absolute;top:18px;left:0;width:50%;height:2px;background:'+s.leftColor+'"></div>'+
      '<div style="position:absolute;top:18px;right:0;width:50%;height:2px;background:'+s.rightColor+'"></div>'+
      '<div style="'+s.nodeStyle+'">'+s.inner+'</div>'+
      '<span style="margin-top:7px;font-size:11px;font-weight:600;text-align:center;color:'+s.labelColor+';line-height:1.3;padding:0 4px">'+esc(s.label)+'</span>'+
      tail+'</div>';
  }).join('');
  var stuckBanner = stuck ? '<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:9px 13px;background:var(--st-stuck-bg);border:1px solid var(--st-stuck-dot);border-radius:11px;font-size:13px;color:var(--st-stuck-fg);font-weight:500"><span style="display:flex">'+IC.warn+'</span>3 fix cycles reached — humans notified 📣</div>' : '';

  var stepper='<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:15px 20px;margin-bottom:16px;overflow-x:auto">'+stuckBanner+'<div style="display:flex;align-items:flex-start;min-width:560px">'+stepsHTML+'</div></div>';

  var mobileTabs = m ? '<div style="display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px">'+
    '<button data-tab="thread" style="'+tabStyle(state.mobileTab==='thread')+'">Thread</button>'+
    '<button data-tab="contract" style="'+tabStyle(state.mobileTab==='contract')+'">Contract</button>'+
    '<button data-tab="log" style="'+tabStyle(state.mobileTab==='log')+'">Log</button></div>' : '';

  var threadDisp = m ? (state.mobileTab==='thread'?'block':'none') : 'block';
  var contractDisp = m ? (state.mobileTab==='contract'?'block':'none') : 'block';
  var logDisp = m ? (state.mobileTab==='log'?'block':'none') : (state.eventLogOpen?'block':'none');
  var rowStyle = m ? 'display:block' : 'display:grid;grid-template-columns:minmax(0,1fr) 372px;gap:16px;align-items:start';

  var eventBtn = m ? '' : '<button data-eventlog="1" style="display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border-radius:9px;border:1px solid '+(state.eventLogOpen?'var(--accent)':'var(--border)')+';background:'+(state.eventLogOpen?'var(--accent-soft)':'var(--surface)')+';color:'+(state.eventLogOpen?'var(--accent-2)':'var(--text-2)')+';cursor:pointer;font-size:13px;font-weight:500">'+IC.log+'Event log</button>';

  return '<div style="max-width:1200px;margin:0 auto;padding:20px 20px 80px">'+
    '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px">'+
      '<button data-home="1" style="display:inline-flex;align-items:center;gap:6px;padding:6px 11px;background:var(--surface);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:13px;color:var(--text-2)">'+IC.back+'Tasks</button>'+
      '<h1 style="font-size:20px;font-weight:700;margin:0;color:var(--text);letter-spacing:-.02em">'+esc(d.title)+'</h1>'+
      '<span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;background:'+chip.bg+';color:'+chip.fg+'"><span style="width:6px;height:6px;border-radius:50%;background:'+chip.dot+'"></span>'+esc(chip.label)+'</span>'+
      '<div style="flex:1"></div>'+eventBtn+'</div>'+
    stepper+readinessFailPanel(d)+mobileTabs+
    '<div style="'+rowStyle+'">'+
      '<div style="display:'+threadDisp+'">'+threadHTML(d)+'</div>'+
      '<div style="display:'+contractDisp+(m?'':';position:sticky;top:72px')+'">'+contractHTML(d)+'</div>'+
    '</div>'+
    '<div style="display:'+logDisp+'">'+eventLogHTML(d)+'</div>'+
    readinessPreviewHTML(d)+
    shortcodesHTML(d)+
    tipsHTML()+
  '</div>';
}

/* ---------- render ---------- */
function sig(){
  var tasksLite=(state.tasks||[]).map(function(t){ return {id:t.id,title:t.title,state:t.state,roles:t.roles,strikes:t.strikes}; });
  return JSON.stringify({
    view:state.view, taskId:state.taskId, error:state.error, theme:state.theme, isMobile:state.isMobile,
    viewer:state.viewer, tasks:tasksLite, detail:state.detail,
    expanded:state.expanded, version:state.version, eventFilter:state.eventFilter,
    eventLogOpen:state.eventLogOpen, mobileTab:state.mobileTab, switcherOpen:state.switcherOpen,
    loading:state.detail?0:state.loadingDetail
  });
}
function render(){
  document.documentElement.setAttribute('data-theme', state.theme);
  var s=sig();
  if(s!==lastSig){
    lastSig=s;
    var html;
    if(state.isMobile) html=mobileGate();
    else if(state.error==='no-token') html=messageScreen('<span style="font-size:22px">🔑</span>','No viewer token','This dashboard needs a viewer token. Open the link your host shared — it looks like /ui?v=sbv_… — to watch this task.');
    else if(state.error==='unauthorized') html=messageScreen('<span style="font-size:22px">🚫</span>','Access denied','This viewer token isn’t valid or has been revoked. Ask your host for a fresh dashboard link.');
    else if(state.error==='forbidden') html=headerHTML()+messageBody('Not your task','This token can only view its own task. '+ (state.viewer&&state.viewer.task_id?('You have access to “'+state.viewer.task_id+'”.'):''));
    else if(state.error==='not-found') html=headerHTML()+messageBody('Task not found','That task doesn’t exist (or was closed).');
    else html=headerHTML()+(state.view==='task'?taskHTML():listHTML());
    app.innerHTML=html;
    bind();
  }
  patchVolatile();
}
function messageBody(title,body){
  return '<div style="max-width:520px;margin:12vh auto 0;padding:40px 24px;text-align:center">'+
    '<h1 style="font-size:19px;font-weight:700;margin:0 0 8px;color:var(--text)">'+esc(title)+'</h1>'+
    '<p style="font-size:14px;color:var(--text-2);margin:0 0 18px;line-height:1.55">'+esc(body)+'</p>'+
    '<button data-home="1" style="padding:8px 14px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);cursor:pointer;font-size:13px">Back to tasks</button></div>';
}

/* volatile bits updated every poll without a full re-render (avoids replaying confetti) */
function patchVolatile(){
  var rt=document.getElementById('sb-refresh-text'); if(rt) rt.textContent=refreshText();
  var dot=document.getElementById('sb-refresh-dot');
  if(dot) dot.style.background = state.error ? 'var(--st-stuck-dot)' : 'var(--st-verified-dot)';
  (state.tasks||[]).forEach(function(t){
    var el=document.querySelector('[data-last="'+cssEsc(t.id)+'"]');
    if(el) el.textContent=t.last||'';
  });
}
function cssEsc(s){ return String(s).replace(/["\\]/g,'\\$&'); }

/* ---------- event binding (delegation) ---------- */
function bind(){
  app.querySelectorAll('[data-open]').forEach(function(el){ el.onclick=function(){ openTask(el.getAttribute('data-open')); }; });
  app.querySelectorAll('[data-home]').forEach(function(el){ el.onclick=function(){ goHome(); }; });
  var sw=app.querySelector('[data-switcher]'); if(sw) sw.onclick=function(e){ e.stopPropagation(); state.switcherOpen=!state.switcherOpen; render(); };
  var tt=app.querySelector('[data-theme-toggle]'); if(tt) tt.onclick=toggleTheme;
  var nt=app.querySelector('[data-newtask]'); if(nt) nt.onclick=function(){ try{ window.pywebview.api.new_task(); }catch(e){} };
  app.querySelectorAll('[data-version]').forEach(function(el){ el.onclick=function(){ state.version[state.taskId]=el.getAttribute('data-version'); render(); }; });
  app.querySelectorAll('[data-ep]').forEach(function(el){ el.onclick=function(){ var k=el.getAttribute('data-ep'); state.expanded[k]=!state.expanded[k]; render(); }; });
  app.querySelectorAll('[data-filter]').forEach(function(el){ el.onclick=function(){ state.eventFilter=el.getAttribute('data-filter'); render(); }; });
  app.querySelectorAll('[data-tab]').forEach(function(el){ el.onclick=function(){ state.mobileTab=el.getAttribute('data-tab'); render(); }; });
  var elg=app.querySelector('[data-eventlog]'); if(elg) elg.onclick=function(){ state.eventLogOpen=!state.eventLogOpen; render(); };
  app.querySelectorAll('.sb-row').forEach(function(el){
    el.onmouseenter=function(){ el.style.borderColor='var(--border-strong)'; el.style.boxShadow='var(--shadow)'; };
    el.onmouseleave=function(){ el.style.borderColor='var(--border)'; el.style.boxShadow='none'; };
  });
}
/* close switcher on outside click */
document.addEventListener('click', function(e){
  if(state.switcherOpen && !e.target.closest('[data-switcher]') && !e.target.closest('[data-open]')){
    state.switcherOpen=false; render();
  }
});
window.addEventListener('resize', function(){
  var mob=window.innerWidth<900;
  if(mob!==state.isMobile){ state.isMobile=mob; render(); }
});

/* ---------- boot + live stream (SSE) ---------- */
/* Replaces the old 3s poll: the broker pushes change notifications over
   GET /api/stream (see SSE contract v1). We refetch via the existing helpers
   when told — we never reload the page, and tokens stay opaque to the client. */
var es=null;                     // active EventSource, or null while paused
var idleTimer=null;
var IDLE_MS=15*60*1000;          // ~15 min of no activity -> pause
var liveBanner=null;

/* one round of "get me current state" using the existing fetch helpers */
function catchUp(){
  fetchTasks();
  if(state.view==='task' && state.taskId) fetchDetail(state.taskId);
}

function ensureBanner(){
  if(liveBanner) return liveBanner;
  var b=document.createElement('div');
  b.id='sb-live-banner';
  b.setAttribute('role','button');
  b.setAttribute('title','Resume live updates');
  b.style.cssText='position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9999;'+
    'display:none;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;cursor:pointer;'+
    'font-family:inherit;font-size:13px;font-weight:500;color:var(--text-2);'+
    'background:var(--surface);border:1px solid var(--border-strong);box-shadow:var(--shadow)';
  b.innerHTML='<span style="width:8px;height:8px;border-radius:50%;background:var(--st-open-dot);display:inline-block"></span>'+
    '<span>Live updates paused — click to resume</span>';
  b.onclick=function(){ resumeStream(); };
  document.body.appendChild(b);
  liveBanner=b;
  return b;
}
function showBanner(){ ensureBanner().style.display='flex'; }
function hideBanner(){ if(liveBanner) liveBanner.style.display='none'; }

/* open (or re-open) the stream. Always starts with a catch-up fetch so a
   resume is never stale, then relies on EventSource auto-reconnect for blips. */
function openStream(){
  catchUp();
  if(es) return;                 // already streaming
  try{
    es=new EventSource('/api/stream');
    es.addEventListener('tasks', function(){ fetchTasks(); });
    es.addEventListener('task', function(e){
      try{ var d=JSON.parse(e.data); if(d && d.id===state.taskId) fetchDetail(d.id); }catch(err){}
    });
    /* onerror: EventSource reconnects itself on server-side drops (ngrok/proxy
       idle timeouts). We only force a true pause via pauseStream() below. */
  }catch(err){ es=null; }
}
/* client-side close = no auto-reconnect = a genuine pause */
function pauseStream(){
  if(es){ es.close(); es=null; }
  showBanner();
}
function resumeStream(){
  hideBanner();
  openStream();
  armIdle();
}

/* ---- inactivity gate: pause after IDLE_MS of no user activity ---- */
function armIdle(){
  if(idleTimer) clearTimeout(idleTimer);
  idleTimer=setTimeout(function(){ pauseStream(); }, IDLE_MS);
}
function onActivity(){
  armIdle();
  if(!es) resumeStream();         // any activity wakes a paused stream
}
['mousemove','keydown','scroll','click','touchstart'].forEach(function(ev){
  window.addEventListener(ev, onActivity, {passive:true});
});

/* ---- visibility gate: pause when hidden, resume (+catch-up) when shown ---- */
document.addEventListener('visibilitychange', function(){
  if(document.hidden) pauseStream();
  else resumeStream();
});

render();
openStream();  // begins with a catch-up fetch; cookie carries auth, a bad token surfaces as 401
armIdle();
setInterval(patchVolatile, 1000); // keep "refreshed Ns ago" ticking (local only)
})();
</script>
</body>
