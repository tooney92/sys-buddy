<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sys-buddy</title>
<!-- sys-buddy desktop home screen (pywebview shell, milestone M0/M1).
     Self-contained: inline CSS/JS, no external libs except the Geist webfont.
     Same design language / palette as ui.html. The two choice cards are
     placeholders for now (Host / Buddy flows land later); the "Connection
     check" button proves the pywebview JS<->Python bridge is live. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --bg:#161514;
  --surface:#201E1D;
  --surface-2:#282624;
  --border:#332F2C;
  --border-strong:#443F3A;
  --text:#F3F1EE;
  --text-2:#A7A29C;
  --text-3:#726D68;
  --accent:#E0693F;
  --accent-2:#F0845C;
  --role-backend:#5468C9;
  --role-frontend:#C0568C;
  --ok:#33A852;
  --err:#DE5B4A;
}
html,body{height:100%}
body{
  min-height:100vh;
  background:
    radial-gradient(1100px 640px at 82% -12%, rgba(224,105,63,.10), transparent 60%),
    radial-gradient(900px 560px at 8% 118%, rgba(84,104,201,.08), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:'Geist',-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
}
.wrap{
  width:100%;
  max-width:920px;
  margin:0 auto;
  padding:clamp(28px,6vh,72px) clamp(20px,5vw,48px);
  flex:1 0 auto;
  display:flex;
  flex-direction:column;
}

/* ---------- wordmark ---------- */
.brand{display:flex;align-items:center;gap:12px}
.mark{display:inline-flex;align-items:center}
.mark .dot{width:11px;height:11px;border-radius:50%}
.mark .dot.a{background:var(--accent)}
.mark .dot.b{background:var(--role-backend)}
.mark .line{width:22px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,var(--accent),var(--role-backend))}
.wordmark{font-size:1.35rem;font-weight:600;letter-spacing:-.01em}
.wordmark .mid{color:var(--accent);font-weight:700;padding:0 1px}

/* ---------- hero ---------- */
.hero{margin-top:clamp(36px,9vh,88px)}
.hero h1{
  margin:0;
  font-size:clamp(1.9rem,5.2vw,3rem);
  font-weight:600;
  letter-spacing:-.02em;
  line-height:1.05;
}
.hero .tagline{
  margin:14px 0 0;
  font-size:clamp(1rem,2.4vw,1.2rem);
  color:var(--text-2);
  font-weight:400;
}
.hero .tagline .em{color:var(--text)}

/* ---------- choice cards ---------- */
.cards{
  margin-top:clamp(28px,5vh,44px);
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
}
@media (max-width:640px){.cards{grid-template-columns:1fr}}
.card{
  appearance:none;
  text-align:left;
  cursor:pointer;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px 22px 20px;
  color:var(--text);
  font-family:inherit;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:border-color .16s ease,transform .16s ease,box-shadow .16s ease,background .16s ease;
}
.card:hover{transform:translateY(-2px);background:var(--surface-2);border-color:var(--border-strong)}
.card:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.card .role-dot{width:12px;height:12px;border-radius:50%}
.card.host .role-dot{background:var(--accent)}
.card.buddy .role-dot{background:var(--role-frontend)}
.card .top{display:flex;align-items:center;gap:10px}
.card .kicker{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);font-weight:600}
.card h2{margin:0;font-size:1.28rem;font-weight:600;letter-spacing:-.01em}
.card p{margin:0;color:var(--text-2);font-size:.92rem;line-height:1.45}
.card .go{margin-top:6px;font-size:.9rem;font-weight:500;color:var(--accent-2);display:inline-flex;align-items:center;gap:6px}

/* ---------- bridge check ---------- */
.foot{
  margin-top:auto;
  padding-top:clamp(28px,6vh,56px);
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
}
.check{
  appearance:none;
  cursor:pointer;
  font-family:inherit;
  font-size:.88rem;
  font-weight:500;
  color:var(--text);
  background:var(--surface-2);
  border:1px solid var(--border-strong);
  border-radius:10px;
  padding:9px 15px;
  transition:border-color .16s ease,background .16s ease;
}
.check:hover{border-color:var(--accent);background:var(--surface)}
.check:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.status{display:inline-flex;align-items:center;gap:8px;font-size:.86rem;color:var(--text-2)}
.status .pip{width:9px;height:9px;border-radius:50%;background:var(--text-3);flex:none}
.status.ok .pip{background:var(--ok)}
.status.ok{color:var(--text)}
.status.err .pip{background:var(--err)}
.status.err{color:var(--err)}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
</style>
</head>
<body>
<main class="wrap">
  <header class="brand">
    <span class="mark" aria-hidden="true">
      <span class="dot a"></span><span class="line"></span><span class="dot b"></span>
    </span>
    <span class="wordmark">sys<span class="mid">·</span>buddy</span>
  </header>

  <section class="hero">
    <h1>Two agents. One contract. Shipped.</h1>
    <p class="tagline">Pick a side to get started — <span class="em">the broker enforces, your agents request.</span></p>

    <div class="cards">
      <button type="button" class="card host" id="card-host">
        <span class="top"><span class="role-dot"></span><span class="kicker">Start a task</span></span>
        <h2>I'm the Host</h2>
        <p>Spin up a task, define the roles, and hand your buddy an invite link.</p>
        <span class="go" aria-hidden="true">Set up a task →</span>
      </button>

      <button type="button" class="card buddy" id="card-buddy">
        <span class="top"><span class="role-dot"></span><span class="kicker">Join a task</span></span>
        <h2>I'm the Buddy</h2>
        <p>Paste an invite link, pair your agent, and wire Claude to the broker.</p>
        <span class="go" aria-hidden="true">Join with a link →</span>
      </button>
    </div>
  </section>

  <footer class="foot">
    <button type="button" class="check" id="check-btn">Connection check</button>
    <span class="status" id="check-status" role="status" aria-live="polite">
      <span class="pip" aria-hidden="true"></span>
      <span id="check-text">Bridge not yet checked.</span>
    </span>
  </footer>
</main>

<script>
(function(){
  "use strict";

  var statusEl = document.getElementById('check-status');
  var textEl = document.getElementById('check-text');

  function setStatus(kind, msg){
    statusEl.className = 'status' + (kind ? ' ' + kind : '');
    textEl.textContent = msg;
  }

  // Placeholder navigation — real Host/Buddy flows arrive in a later milestone.
  document.getElementById('card-host').addEventListener('click', function(){
    console.log('[sys-buddy] Host flow selected (not yet implemented).');
  });
  document.getElementById('card-buddy').addEventListener('click', function(){
    console.log('[sys-buddy] Buddy flow selected (not yet implemented).');
  });

  // Bridge probe. Guarded so opening this file in a plain browser (no pywebview)
  // degrades gracefully instead of throwing.
  document.getElementById('check-btn').addEventListener('click', function(){
    var api = window.pywebview && window.pywebview.api;
    if (!api || typeof api.ping !== 'function') {
      setStatus('err', 'No native bridge — running outside the sys-buddy app.');
      return;
    }
    setStatus('', 'Checking…');
    Promise.resolve(api.ping()).then(function(res){
      if (res === 'pong') {
        setStatus('ok', 'Bridge live — Python answered "pong".');
      } else {
        setStatus('err', 'Unexpected reply: ' + String(res));
      }
    }).catch(function(err){
      setStatus('err', 'Bridge error: ' + (err && err.message ? err.message : String(err)));
    });
  });
})();
</script>
</body>
</html>
